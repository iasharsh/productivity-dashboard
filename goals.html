<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Goals</title>
    <link rel="stylesheet" href="./css/goals.css">
</head>

<body>
    <header>
        <h1>Daily Goals</h1>
        <button class="close-btn">✖</button>
    </header>

    <section class="goals-container">
        <!-- Left: Goal Form -->
        <div class="goal-form">
            <input type="text" id="goal-title" placeholder="Enter goals">
            <textarea id="goal-desc" placeholder="Enter your goals"></textarea>
            <button id="add-goal">All Goals</button>
        </div>

        <!-- Right: Goal List (empty for DOM updates) -->
        <div class="goal-list" id="goal-list"></div>
    </section>

    <script src="./js/goals.js"></script>
</body>

</html>
