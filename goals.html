<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Goals</title>
    <link rel="stylesheet" href="./css/goals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <h1>Daily Goals</h1>
        <button class="close-btn">✖</button>
    </header>

    <section class="goals-container">
        <div class="goal-form">
            <input type="text" id="goal-title" placeholder="Enter goals">
            <textarea id="goal-desc" placeholder="Enter your goal description"></textarea>
            <label>
                <input type="checkbox" id="important"> Mark as Important !
            </label>
            <div class="btn-group">
                <button id="add-goal">Add Goal</button>
                <button id="cancel-edit">Cancel</button>
            </div>
        </div>


        <div class="goal-panel">
            <div id="date-header" class="date-header"></div>
            <div class="goal-list" id="goal-list"></div>
        </div>



    </section>

    <script src="./js/goals.js"></script>
</body>

</html>
