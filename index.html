<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity-Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="topbar">
        <h1 class="topbar-title">Productivity Dashboard</h1>
        <div class="topbar-icons">
            <button id="theme-toggle" class="icon-btn-round" aria-label="Toggle theme">
                <span id="theme-icon" class="material-symbols-outlined">light_mode</span>
            </button>
            <a class="icon-btn-round" href="https://github.com/" target="_blank" rel="noopener"
                aria-label="Source code">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                </svg>
            </a>
        </div>
    </header>

    <main class="hero">
        <div class="sky">
            <video class="sky-video night-video" src="./video/night.mp4" muted loop playsinline></video>
            <video class="sky-video day-video" src="./video/day.mp4" muted loop playsinline></video>
            <div class="stars">
            </div>
            <div class="moon"></div>
        </div>

        <div class="glass-card">
            <div class="glass-left">
                <p id="glass-date" class="glass-date">6 July, 2026</p>
                <h2 id="glass-time" class="glass-time">Monday, 02:14:51 AM</h2>
                <p id="glass-location" class="glass-location">Locating…</p>
            </div>
            <div class="glass-right">
                <p id="glass-temp" class="glass-temp">—°C</p>
                <p id="glass-desc" class="glass-desc">—</p>
                <ul class="glass-stats">
                    <li>Feels like: <span id="glass-feels">—</span></li>
                    <li>Humidity: <span id="glass-humidity">—</span></li>
                    <li>Wind: <span id="glass-wind">—</span></li>
                </ul>
            </div>
        </div>
        <nav class="icon-col" aria-label="Dashboard sections">
            <a href="dashboard.html#tasks" class="icon-circle" style="--tint:#c9d6f2">
                <img class="icon-img" src="./img/todo-light.avif" alt="To-do list">
                <video class="icon-video" src="./video/todo.mp4" muted loop playsinline></video>
            </a>
            <a href="dashboard.html#tasks" class="icon-circle" style="--tint:#c9d6f2">
                <img class="icon-img" src="./img/daily-planLight.jpg" alt="To-do list">
                <video class="icon-video" src="./video/daily-plan.mp4" muted loop playsinline></video>
            </a>
            <a href="dashboard.html#tasks" class="icon-circle" style="--tint:#c9d6f2">
                <img class="icon-img" src="./img/moti-light.jpg" alt="To-do list">
                <video class="icon-video" src="./video/motivation.mp4" muted loop playsinline></video>
            </a>
            <a href="dashboard.html#tasks" class="icon-circle" style="--tint:#c9d6f2">
                <img class="icon-img" src="./img/pomolight.jpeg" alt="To-do list">
                <video class="icon-video" src="./video/pomo.mp4" muted loop playsinline></video>
            </a>
            <a href="dashboard.html#tasks" class="icon-circle" style="--tint:#c9d6f2">
                <img class="icon-img" src="./img/goalsLight.avif" alt="To-do list">
                <video class="icon-video" src="./video/goals.mp4" muted loop playsinline></video>
            </a>
        </nav>

    </main>

    <script src="./js/script.js"></script>
</body>

</html>
